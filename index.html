                                                            background: 'var(--bg-card)',
                                                            resize: 'vertical',
                                                            outline: 'none'
                                                        }}
                                                        onFocus={(e) => e.target.style.borderColor = 'var(--accent)'}
                                                        onBlur={(e) => e.target.style.borderColor = 'var(--border)'}
                                                    />
                                                    <div style={{ display: 'flex', gap: '10px', marginTop: '12px' }}>
                                                        <Button
                                                            onClick={(e) => {
                                                                e.stopPropagation();
                                                                onComplete(r.id, responses[r.id]);
                                                                setResponses(prev => ({ ...prev, [r.id]: '' }));
                                                                setOpenCardId(null);
                                                            }}
                                                            size="md"
                                                            style={{ flex: 1 }}
                                                        >
                                                            ✅ Complete & Notify
                                                        </Button>
                                                        <Button
                                                            onClick={(e) => { e.stopPropagation(); onCloseQuietly(r.id); setOpenCardId(null); }}
                                                            variant="secondary"
                                                            size="md"
                                                        >
                                                            Close Quietly
                                                        </Button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {/* ── COMPLETED ── */}
                        {tab === 'completed' && (
                            <div className="fade-in">
                                <SearchBar
                                    value={completedSearch}
                                    onChange={setCompletedSearch}
                                    placeholder="Search by sender, item, order #, response..."
                                />

                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px', flexWrap: 'wrap', gap: '8px' }}>
                                    <p style={{ fontSize: '13px', color: 'var(--text-tertiary)' }}>
                                        {completedSearch ? `Showing ${filteredCompleted.length} of ` : ''}{completed.length} completed request{completed.length !== 1 ? 's' : ''}
                                    </p>
                                    {completed.length > 0 && (
                                        <div style={{ display: 'flex', gap: '8px' }}>
                                            <Button onClick={toggleSelectAll} variant="secondary" size="sm">
                                                {selectedIds.length === completed.length ? 'Deselect All' : 'Select All'}
                                            </Button>
                                            {selectedIds.length > 0 && (
                                                <Button onClick={() => { onBulkDelete(selectedIds); setSelectedIds([]); }} variant="danger" size="sm">
                                                    Delete ({selectedIds.length})
                                                </Button>
                                            )}
                                        </div>
                                    )}
                                </div>

                                {completed.length === 0 ? (
                                    <EmptyState icon="✅" message="No completed requests" />
                                ) : filteredCompleted.length === 0 ? (
                                    <EmptyState icon="🔍" message="No matches" />
                                ) : (
                                    filteredCompleted.map(r => (
                                        <div key={r.id} style={{ position: 'relative' }}>
                                            <div style={{ position: 'absolute', top: '16px', left: '10px', zIndex: 1 }}>
                                                <input
                                                    type="checkbox"
                                                    checked={selectedIds.includes(r.id)}
                                                    onChange={() => toggleSelect(r.id)}
                                                    style={{ width: '16px', height: '16px', cursor: 'pointer', accentColor: 'var(--accent)' }}
                                                />
                                            </div>
                                            <RequestCard request={r} selected={selectedIds.includes(r.id)}>
                                                <button
                                                    onClick={(e) => { e.stopPropagation(); onDelete(r.id); }}
                                                    style={{
                                                        background: 'none', border: 'none',
                                                        color: 'var(--text-tertiary)',
                                                        cursor: 'pointer', fontSize: '20px',
                                                        lineHeight: 1, padding: '4px',
                                                        transition: 'color 0.15s'
                                                    }}
                                                    onMouseEnter={(e) => e.target.style.color = 'var(--red-text)'}
                                                    onMouseLeave={(e) => e.target.style.color = 'var(--text-tertiary)'}
                                                    title="Delete"
                                                >×</button>
                                            </RequestCard>
                                            {r.response && r.response !== '(Closed without response)' && (
                                                <div style={{
                                                    marginTop: '-4px', marginBottom: '12px',
                                                    padding: '14px 18px',
                                                    background: 'var(--green-bg)',
                                                    border: '1px solid var(--green-border)',
                                                    borderRadius: '0 0 var(--radius-md) var(--radius-md)',
                                                    fontSize: '13px'
                                                }}>
                                                    <div style={{ fontWeight: 600, color: 'var(--green-text)', marginBottom: '4px' }}>Response</div>
                                                    <div style={{ color: 'var(--text-primary)' }}>{r.response}</div>
                                                </div>
                                            )}
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {/* ── USER MANAGEMENT ── */}
                        {tab === 'users' && (
                            <div className="fade-in">
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                                    <div>
                                        <h2 style={{ fontSize: '18px', fontWeight: 700, marginBottom: '4px' }}>User Management</h2>
                                        <p style={{ fontSize: '13px', color: 'var(--text-tertiary)' }}>
                                            {activeSessionCount} active session{activeSessionCount !== 1 ? 's' : ''}
                                        </p>
                                    </div>
                                </div>

                                {/* Active sessions */}
                                <div style={{ marginBottom: '32px' }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '14px' }}>
                                        <span style={{
                                            width: '10px', height: '10px', borderRadius: '50%',
                                            background: '#4CAF50', display: 'inline-block',
                                            boxShadow: '0 0 6px rgba(76,175,80,0.5)'
                                        }} />
                                        <h3 style={{ fontSize: '14px', fontWeight: 700, color: 'var(--green-text)' }}>
                                            Online Now ({activeSessionCount})
                                        </h3>
                                    </div>

                                    {activeSessionCount === 0 ? (
                                        <div style={{
                                            padding: '32px 20px', textAlign: 'center',
                                            background: 'var(--bg-muted)', borderRadius: 'var(--radius-md)',
                                            color: 'var(--text-tertiary)', fontSize: '14px'
                                        }}>
                                            No users currently online
                                        </div>
                                    ) : (
                                        Object.values(sessions).map(session => {
                                            const uStat = userStats[session.email];
                                            return (
                                                <div key={session.email} style={{
                                                    background: 'var(--bg-card)',
                                                    border: '1px solid var(--border)',
                                                    borderRadius: 'var(--radius-lg)',
                                                    padding: '18px 22px',
                                                    marginBottom: '10px',
                                                    boxShadow: 'var(--shadow-card)',
                                                    display: 'flex',
                                                    justifyContent: 'space-between',
                                                    alignItems: 'center',
                                                    gap: '16px'
                                                }}>
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: '14px', flex: 1, minWidth: 0 }}>
                                                        <div style={{
                                                            width: '42px', height: '42px', borderRadius: '50%',
                                                            background: 'var(--accent)', color: '#fff',
                                                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                                                            fontSize: '16px', fontWeight: 700, flexShrink: 0,
                                                            textTransform: 'uppercase'
                                                        }}>
                                                            {(session.name || '?').charAt(0)}
                                                        </div>
                                                        <div style={{ minWidth: 0, flex: 1 }}>
                                                            <div style={{ display: 'flex', alignItems: 'center', gap: '8px', flexWrap: 'wrap' }}>
                                                                <span style={{ fontWeight: 700, fontSize: '14px' }}>{session.name}</span>
                                                                <span style={{
                                                                    display: 'inline-flex', alignItems: 'center', gap: '4px',
                                                                    padding: '2px 10px', borderRadius: 'var(--radius-pill)',
                                                                    background: 'var(--green-badge-bg)',
                                                                    border: '1px solid var(--green-border)',
                                                                    fontSize: '11px', fontWeight: 600,
                                                                    color: 'var(--green-text)'
                                                                }}>
                                                                    <span style={{
                                                                        width: '6px', height: '6px', borderRadius: '50%',
                                                                        background: 'var(--green-border)', display: 'inline-block'
                                                                    }} />
                                                                    Online
                                                                </span>
                                                            </div>
                                                            <div style={{ fontSize: '12px', color: 'var(--text-tertiary)', marginTop: '2px' }}>
                                                                {session.email}
                                                            </div>
                                                            <div style={{ display: 'flex', gap: '16px', marginTop: '6px', fontSize: '12px', color: 'var(--text-secondary)' }}>
                                                                <span>Last seen: <strong>{getTimeSince(session.lastLogin)}</strong></span>
                                                                {uStat && (
                                                                    <>
                                                                        <span>Requests: <strong>{uStat.total}</strong></span>
                                                                        {uStat.pending > 0 && (
                                                                            <span style={{ color: 'var(--yellow-text)' }}>
                                                                                Pending: <strong>{uStat.pending}</strong>
                                                                            </span>
                                                                        )}
                                                                    </>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div style={{ display: 'flex', gap: '8px', flexShrink: 0 }}>
                                                        {uStat && uStat.pending > 0 && (
                                                            <Button onClick={() => viewUserRequests(session.email)} variant="secondary" size="sm">
                                                                View Requests
                                                            </Button>
                                                        )}
                                                        <Button onClick={() => onForceLogout(session.email, session.name)} variant="danger" size="sm">
                                                            Force Logout
                                                        </Button>
                                                    </div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>

                                {/* All known users table */}
                                <div>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '14px' }}>
                                        <h3 style={{ fontSize: '14px', fontWeight: 700, color: 'var(--text-secondary)' }}>
                                            All Known Users ({sortedUsers.length})
                                        </h3>
                                    </div>

                                    <div style={{ overflowX: 'auto' }}>
                                        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '13px' }}>
                                            <thead>
                                                <tr>
                                                    {['User', 'Status', 'Total', 'Pending', 'Last Active', 'Actions'].map(h => (
                                                        <th key={h} style={{
                                                            textAlign: h === 'User' ? 'left' : 'center',
                                                            padding: '10px 12px',
                                                            borderBottom: '1px solid var(--border)',
                                                            fontWeight: 600,
                                                            color: 'var(--text-secondary)',
                                                            background: 'var(--bg-muted)',
                                                            whiteSpace: 'nowrap'
                                                        }}>{h}</th>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {sortedUsers.map(user => {
                                                    const sKey = user.email.replace(/[.@]/g, '_');
                                                    const isOnline = !!sessions[sKey];
                                                    return (
                                                        <tr key={user.email} style={{ borderBottom: '1px solid var(--border)' }}
                                                            onMouseEnter={(e) => e.currentTarget.style.background = 'var(--bg-hover)'}
                                                            onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
                                                        >
                                                            <td style={{ padding: '12px' }}>
                                                                <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                                                    <div style={{
                                                                        width: '32px', height: '32px', borderRadius: '50%',
                                                                        background: isOnline ? 'var(--accent)' : 'var(--bg-muted)',
                                                                        color: isOnline ? '#fff' : 'var(--text-tertiary)',
                                                                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                                                                        fontSize: '13px', fontWeight: 700, flexShrink: 0, textTransform: 'uppercase'
                                                                    }}>{(user.name || '?').charAt(0)}</div>
                                                                    <div>
                                                                        <div style={{ fontWeight: 600 }}>{user.name}</div>
                                                                        <div style={{ fontSize: '11px', color: 'var(--text-tertiary)' }}>{user.email}</div>
                                                                    </div>
                                                                </div>
                                                            </td>
                                                            <td style={{ textAlign: 'center', padding: '12px' }}>
                                                                <span style={{
                                                                    display: 'inline-flex', alignItems: 'center', gap: '5px',
                                                                    padding: '3px 10px', borderRadius: 'var(--radius-pill)', fontSize: '11px', fontWeight: 600,
                                                                    background: isOnline ? 'var(--green-badge-bg)' : 'var(--bg-muted)',
                                                                    color: isOnline ? 'var(--green-text)' : 'var(--text-tertiary)',
                                                                    border: `1px solid ${isOnline ? 'var(--green-border)' : 'var(--border)'}`
                                                                }}>
                                                                    <span style={{ width: '6px', height: '6px', borderRadius: '50%', background: isOnline ? 'var(--green-border)' : 'var(--text-tertiary)', display: 'inline-block' }} />
                                                                    {isOnline ? 'Online' : 'Offline'}
                                                                </span>
                                                            </td>
                                                            <td style={{ textAlign: 'center', padding: '12px', fontWeight: 700 }}>{user.total}</td>
                                                            <td style={{ textAlign: 'center', padding: '12px', fontWeight: user.pending > 0 ? 700 : 400, color: user.pending > 0 ? 'var(--yellow-text)' : 'var(--text-tertiary)' }}>
                                                                {user.pending > 0 ? (
                                                                    <button onClick={() => viewUserRequests(user.email)}
                                                                        style={{ background: 'none', border: 'none', color: 'var(--yellow-text)', fontWeight: 700, cursor: 'pointer', fontFamily: 'var(--font-main)', fontSize: '13px', textDecoration: 'underline' }}
                                                                    >{user.pending}</button>
                                                                ) : '0'}
                                                            </td>
                                                            <td style={{ textAlign: 'center', padding: '12px', fontSize: '12px', color: 'var(--text-tertiary)' }}>
                                                                {user.lastLogin ? getTimeSince(user.lastLogin) : 'Never'}
                                                            </td>
                                                            <td style={{ textAlign: 'center', padding: '12px' }}>
                                                                {isOnline ? (
                                                                    <Button onClick={() => onForceLogout(user.email, user.name)} variant="danger" size="sm">Logout</Button>
                                                                ) : (
                                                                    <span style={{ fontSize: '11px', color: 'var(--text-tertiary)' }}>—</span>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        /* ═══════════════════════════════════════════════════
           APP ROOT
           ═══════════════════════════════════════════════════ */
        function App() {
            const [view, setView] = useState('login');
            const [userRole, setUserRole] = useState(null);
            const [userName, setUserName] = useState('');
            const [userEmail, setUserEmail] = useState('');
            const [requests, setRequests] = useState([]);
            const [sessions, setSessions] = useState({});
            const [loading, setLoading] = useState(false);

            // Restore session from localStorage
            useEffect(() => {
                const savedEmail = localStorage.getItem('jomashopEmail');
                const savedName = localStorage.getItem('jomashopName');
                const savedRole = localStorage.getItem('jomashopRole');
                if (savedEmail && savedName && savedRole) {
                    setUserEmail(savedEmail);
                    setUserName(savedName);
                    setUserRole(savedRole);
                    setView(savedRole === 'team' ? 'team' : 'manager');
                    trackUserSession(savedEmail, savedName);
                }
            }, []);

            // Subscribe to requests
            useEffect(() => {
                setLoading(true);
                const ref = database.ref('requests');
                ref.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const arr = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                        setRequests(arr.sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt)));
                    } else {
                        setRequests([]);
                    }
                    setLoading(false);
                });
                return () => ref.off();
            }, []);

            // Subscribe to sessions (manager only)
            useEffect(() => {
                if (userRole === 'manager') {
                    const ref = database.ref('sessions');
                    ref.on('value', (snapshot) => setSessions(snapshot.val() || {}));
                    return () => ref.off();
                }
            }, [userRole]);

            // Update favicon on request changes
            useEffect(() => {
                if (userRole === 'manager') {
                    const count = requests.filter(r => r.status === 'pending').length;
                    updateFavicon(count);
                    document.title = count > 0 ? `(${count}) Jomashop Requests` : 'Jomashop Request Manager';
                } else {
                    updateFavicon(0);
                }
            }, [requests, userRole]);

            // ── Handlers ──
            const handleLogin = (role, name, email) => {
                setUserRole(role);
                setUserName(name);
                setUserEmail(email);
                localStorage.setItem('jomashopEmail', email);
                localStorage.setItem('jomashopName', name);
                localStorage.setItem('jomashopRole', role);
                setView(role === 'team' ? 'team' : 'manager');
                trackUserSession(email, name);
            };

            const handleLogout = () => {
                removeUserSession(userEmail);
                localStorage.removeItem('jomashopEmail');
                localStorage.removeItem('jomashopName');
                localStorage.removeItem('jomashopRole');
                setView('login');
                setUserRole(null);
                setUserName('');
                setUserEmail('');
                updateFavicon(0);
                document.title = 'Jomashop Request Manager';
            };

            const submitRequest = async (req) => {
                const newRequest = {
                    ...req,
                    submittedBy: userEmail,
                    submittedByName: userName,
                    submittedAt: new Date().toISOString(),
                    status: 'pending',
                    response: ''
                };
                await database.ref('requests').push(newRequest);
                try {
                    await sendManagerNotification(newRequest);
                    alert('✅ Request submitted! Manager has been notified.');
                } catch {
                    alert('✅ Request submitted! (Email notification failed, but request was saved)');
                }
            };

            const completeRequest = async (id, response) => {
                if (!response?.trim()) { alert('Please type a response'); return; }
                const request = requests.find(r => r.id === id);
                await database.ref(`requests/${id}`).update({
                    status: 'completed',
                    response,
                    completedAt: new Date().toISOString()
                });
                try {
                    await Promise.all([
                        sendCompletionEmail(request, response),
                        sendTeamsNotification(request, response)
                    ]);
                    alert('✅ Response sent! Notifications delivered to ' + request.submittedByName);
                } catch {
                    alert('✅ Response saved! (Some notifications may have failed)');
                }
            };

            const closeRequestQuietly = async (id) => {
                if (confirm('Close this request without notifying the team member?')) {
                    await database.ref(`requests/${id}`).update({
                        status: 'completed',
                        response: '(Closed without response)',
                        completedAt: new Date().toISOString()
                    });
                }
            };

            const deleteRequest = async (id) => {
                if (confirm('Delete this request?')) {
                    await database.ref(`requests/${id}`).remove();
                }
            };

            const bulkDeleteRequests = async (ids) => {
                if (confirm(`Delete ${ids.length} request(s)?`)) {
                    await Promise.all(ids.map(id => database.ref(`requests/${id}`).remove()));
                }
            };

            const forceLogoutUser = async (email, name) => {
                if (confirm(`Force logout for ${name}?`)) {
                    await removeUserSession(email);
                    alert(`✅ ${name} has been logged out`);
                }
            };

            // ── Render ──
            if (view === 'login') return <LoginView onLogin={handleLogin} />;

            if (loading) {
                return (
                    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg-page)' }}>
                        <div style={{ textAlign: 'center', color: 'var(--text-secondary)' }}>
                            <div style={{ fontSize: '40px', marginBottom: '12px' }}>⏳</div>
                            <p style={{ fontSize: '15px' }}>Loading requests...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div style={{ minHeight: '100vh', background: 'var(--bg-page)' }}>
                    {/* Top header bar */}
                    <header style={{
                        background: 'var(--bg-card)',
                        borderBottom: '1px solid var(--border)',
                        position: 'sticky',
                        top: 0,
                        zIndex: 10
                    }}>
                        <div className="app-header-inner" style={{
                            maxWidth: '960px',
                            margin: '0 auto',
                            padding: '16px 28px',
                            display: 'flex',
                            justifyContent: 'space-between',
                            alignItems: 'center'
                        }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '12px', minWidth: 0, flex: 1 }}>
                                <img src={LOGO_URL} alt="Jomashop" style={{
                                    width: '36px', height: '36px',
                                    borderRadius: 'var(--radius-sm)',
                                    objectFit: 'cover',
                                    flexShrink: 0
                                }} />
                                <div style={{ minWidth: 0 }}>
                                    <div style={{ fontSize: '15px', fontWeight: 700 }}>Request Manager</div>
                                    <div style={{ fontSize: '11px', color: 'var(--text-secondary)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                                        {userName}
                                        <span style={{
                                            display: 'inline-block',
                                            marginLeft: '6px',
                                            padding: '1px 8px',
                                            borderRadius: 'var(--radius-pill)',
                                            background: userRole === 'manager' ? 'var(--accent-light)' : 'var(--blue-bg)',
                                            color: userRole === 'manager' ? 'var(--accent)' : 'var(--blue-text)',
                                            fontSize: '10px',
                                            fontWeight: 600
                                        }}>
                                            {userRole === 'manager' ? 'Admin' : 'Team'}
                                        </span>
                                    </div>
                                </div>
                            </div>
                            <Button onClick={handleLogout} variant="secondary" size="sm">Sign out</Button>
                        </div>
                    </header>

                    {/* Main content */}
                    <main className="app-main" style={{
                        maxWidth: '960px',
                        margin: '0 auto',
                        padding: '0 28px 40px'
                    }}>
                        {userRole === 'team' && (
                            <TeamView
                                userName={userName}
                                userEmail={userEmail}
                                requests={requests}
                                onSubmit={submitRequest}
                            />
                        )}
                        {userRole === 'manager' && (
                            <ManagerView
                                requests={requests}
                                sessions={sessions}
                                onComplete={completeRequest}
                                onCloseQuietly={closeRequestQuietly}
                                onDelete={deleteRequest}
                                onBulkDelete={bulkDeleteRequests}
                                onForceLogout={forceLogoutUser}
                            />
                        )}
                    </main>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
