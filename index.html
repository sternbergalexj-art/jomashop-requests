    <style>
        /* ═══════════════════════════════════════════════════
           DESIGN SYSTEM — Wire Dashboard Style
           ═══════════════════════════════════════════════════ */
        :root {
            --font-main: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;

            /* Neutrals */
            --bg-page: #FAFAF7;
            --bg-card: #FFFFFF;
            --bg-hover: #F7F7F4;
            --bg-muted: #F3F3EF;
            --border: #E5E5E0;
            --border-strong: #D4D4CF;
            --text-primary: #1A1A18;
            --text-secondary: #6B6B66;
            --text-tertiary: #9C9C96;

            /* Status Colors */
            --green-bg: #F0FAF0;
            --green-border: #7CB342;
            --green-text: #33691E;
            --green-badge-bg: #E8F5E9;

            --yellow-bg: #FFFDE7;
            --yellow-border: #F9A825;
            --yellow-text: #E65100;
            --yellow-badge-bg: #FFF8E1;

            --red-bg: #FFF5F5;
            --red-border: #EF5350;
            --red-text: #C62828;

            --blue-bg: #F0F7FF;
            --blue-border: #42A5F5;
            --blue-text: #1565C0;

            /* Jomashop green accent */
            --accent: #4A7C59;
            --accent-hover: #3D6A4A;
            --accent-light: #EDF5F0;

            /* Spacing */
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-pill: 100px;

            /* Shadows */
            --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
            --shadow-card-hover: 0 4px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
            --shadow-dropdown: 0 8px 24px rgba(0,0,0,0.08);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background: var(--bg-page);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideDown {
            from { opacity: 0; max-height: 0; }
            to { opacity: 1; max-height: 600px; }
        }

        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .stagger-1 { animation-delay: 0.05s; opacity: 0; }
        .stagger-2 { animation-delay: 0.1s; opacity: 0; }
        .stagger-3 { animation-delay: 0.15s; opacity: 0; }
        .stagger-4 { animation-delay: 0.2s; opacity: 0; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

        /* Focus styles */
        *:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
    </style>
</head>

        /* ═══════════════════════════════════════════════════
           INITIALIZE SERVICES
           ═══════════════════════════════════════════════════ */
        emailjs.init(CONFIG.emailjs.publicKey);

        if (!firebase.apps.length) {
            firebase.initializeApp(CONFIG.firebase);
        }
        const database = firebase.database();

        /* ═══════════════════════════════════════════════════
           UTILITY FUNCTIONS
           ═══════════════════════════════════════════════════ */
        const formatDate = (isoString) => {
            if (!isoString) return '—';
            return new Date(isoString).toLocaleString();
        };

        const getTimeSince = (isoString) => {
            if (!isoString) return 'Never';
            const diffMs = Date.now() - new Date(isoString).getTime();
            const mins = Math.floor(diffMs / 60000);
            const hrs = Math.floor(diffMs / 3600000);
            const days = Math.floor(diffMs / 86400000);
            if (mins < 1) return 'Just now';
            if (mins < 60) return `${mins}m ago`;
            if (hrs < 24) return `${hrs}h ago`;
            return `${days}d ago`;
        };

        const getRequestLabel = (type) => type === 'get-item' ? 'Get Item' : 'Fill Order';
        const getRequestIcon = (type) => type === 'get-item' ? '🛍️' : '📦';

        const escapeCSV = (val) => {
            const str = String(val ?? '');
            if (str.includes(',') || str.includes('"') || str.includes('\n')) {
                return `"${str.replace(/"/g, '""')}"`;
            }
            return str;
        };

        const downloadCSV = (rows, filename) => {
            const csv = rows.map(row => row.map(escapeCSV).join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        };

        const buildRequestDetails = (request) => {
            if (request.type === 'get-item') {
                const parts = [`Item: ${request.item}`];
                if (request.link) parts.push(`Link: ${request.link}`);
                if (request.pricePoint) parts.push(`Price Point: ${request.pricePoint}`);
                if (request.zendeskId) parts.push(`Zendesk ID/Customer: ${request.zendeskId}`);
                return parts.join('\n');
            }
            const parts = [`Order Number: ${request.orderNumber}`, `Item: ${request.item}`];
            if (request.zendeskId) parts.push(`Zendesk ID/Customer: ${request.zendeskId}`);
            return parts.join('\n');
        };

        /* ═══════════════════════════════════════════════════
           FAVICON
           ═══════════════════════════════════════════════════ */
        function updateFavicon(pendingCount) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');

            const gradient = ctx.createLinearGradient(0, 0, 0, 128);
            gradient.addColorStop(0, '#5B8C6A');
            gradient.addColorStop(1, '#4A7C59');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 128, 128);

            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 90px "DM Sans", Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('J', 64, 70);

            if (pendingCount > 0) {
                ctx.fillStyle = '#EF4444';
                ctx.beginPath();
                ctx.arc(95, 33, 30, 0, 2 * Math.PI);
                ctx.fill();
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 4;
                ctx.stroke();
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 40px "DM Sans", Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(pendingCount > 9 ? '9+' : String(pendingCount), 95, 36);
            }

            document.getElementById('favicon').href = canvas.toDataURL('image/png');
        }

        /* ═══════════════════════════════════════════════════
           NOTIFICATION SERVICES
           ═══════════════════════════════════════════════════ */
        async function sendManagerNotification(request) {
            const templateParams = {
                requester_name: request.submittedByName,
                requester_email: request.submittedBy,
                request_type: getRequestLabel(request.type),
                request_details: buildRequestDetails(request),
                submitted_time: new Date(request.submittedAt).toLocaleString()
            };

            try {
                return await emailjs.send(CONFIG.emailjs.serviceId, CONFIG.emailjs.templateNewRequest, templateParams);
            } catch (error) {
                console.error('Manager notification failed:', error);
                throw error;
            }
        }

        async function sendCompletionEmail(request, response) {
            const templateParams = {
                requester_name: request.submittedByName,
                to_email: request.submittedBy,
                request_type: getRequestLabel(request.type),
                request_details: buildRequestDetails(request),
                manager_response: response
            };

            try {
                return await emailjs.send(CONFIG.emailjs.serviceId, CONFIG.emailjs.templateCompletion, templateParams);
            } catch (error) {
                console.error('Completion email failed:', error);
                throw error;
            }
        }

        async function sendTeamsNotification(request, response) {
            const message = {
                type: "message",
                attachments: [{
                    contentType: "application/vnd.microsoft.card.adaptive",
                    content: {
                        type: "AdaptiveCard",
                        version: "1.4",
                        body: [
                            { type: "TextBlock", text: "✅ Request Completed", weight: "Bolder", size: "Large", color: "Good" },
                            {
                                type: "FactSet",
                                facts: [
                                    { title: "Requester:", value: request.submittedByName },
                                    { title: "Email:", value: request.submittedBy },
                                    { title: "Request Type:", value: getRequestLabel(request.type) },
                                    { title: request.type === 'get-item' ? 'Item:' : 'Order Number:', value: request.type === 'get-item' ? request.item : request.orderNumber }
                                ]
                            },
                            { type: "TextBlock", text: "Manager Response:", weight: "Bolder", spacing: "Medium" },
                            { type: "TextBlock", text: response, wrap: true, color: "Accent" }
                        ]
                    }
                }]
            };

            try {
                return await fetch(CONFIG.teamsWebhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(message)
                });
            } catch (error) {
                console.error('Teams notification failed:', error);
            }
        }

        /* ═══════════════════════════════════════════════════
           SESSION MANAGEMENT
           ═══════════════════════════════════════════════════ */
        function trackUserSession(email, name) {
            database.ref(`sessions/${email.replace(/[.@]/g, '_')}`).set({
                email, name,
                lastLogin: new Date().toISOString(),
                timestamp: Date.now()
            });
        }

        function removeUserSession(email) {
            database.ref(`sessions/${email.replace(/[.@]/g, '_')}`).remove();
        }

        /* ═══════════════════════════════════════════════════
           SHARED UI COMPONENTS
           ═══════════════════════════════════════════════════ */

        // ── Status Badge (pill) ──
        function StatusBadge({ status }) {
            const styles = {
                pending: { background: 'var(--yellow-badge-bg)', color: 'var(--yellow-text)', border: `1px solid var(--yellow-border)` },
                completed: { background: 'var(--green-badge-bg)', color: 'var(--green-text)', border: `1px solid var(--green-border)` }
            };
            const s = styles[status] || styles.pending;
            return (
                <span style={{
                    ...s,
                    display: 'inline-block',
                    padding: '2px 12px',
                    borderRadius: 'var(--radius-pill)',
                    fontSize: '12px',
                    fontWeight: 600,
                    letterSpacing: '0.01em',
                    textTransform: 'capitalize'
                }}>
                    {status}
                </span>
            );
        }

        // ── Stat Card ──
        function StatCard({ label, value, highlight }) {
            return (
                <div style={{
                    background: 'var(--bg-card)',
                    border: '1px solid var(--border)',
                    borderRadius: 'var(--radius-md)',
                    padding: '20px 24px',
                    flex: 1,
                    minWidth: 0
                }}>
                    <div style={{ fontSize: '13px', color: 'var(--text-secondary)', marginBottom: '6px', fontWeight: 500 }}>{label}</div>
                    <div style={{
                        fontSize: highlight ? '28px' : '32px',
                        fontWeight: 700,
                        color: highlight ? 'var(--accent)' : 'var(--text-primary)',
                        letterSpacing: '-0.02em'
                    }}>{value}</div>
                </div>
            );
        }

        // ── Tab Bar (Wire-style underline tabs) ──
        function TabBar({ tabs, active, onChange }) {
            return (
                <div style={{
                    display: 'flex',
                    gap: '4px',
                    marginBottom: '20px',
                    flexWrap: 'wrap'
                }}>
                    {tabs.map(tab => {
                        const isActive = active === tab.key;
                        return (
                            <button
                                key={tab.key}
                                onClick={() => onChange(tab.key)}
                                style={{
                                    padding: '8px 18px',
                                    borderRadius: 'var(--radius-pill)',
                                    border: `1px solid ${isActive ? 'var(--accent)' : 'var(--border)'}`,
                                    background: isActive ? 'var(--accent-light)' : 'transparent',
                                    color: isActive ? 'var(--accent)' : 'var(--text-secondary)',
                                    fontSize: '13px',
                                    fontWeight: 600,
                                    cursor: 'pointer',
                                    fontFamily: 'var(--font-main)',
                                    transition: 'all 0.15s ease',
                                    whiteSpace: 'nowrap'
                                }}
                            >
                                {tab.label}
                            </button>
                        );
                    })}
                </div>
            );
        }

        // ── Page-level Tab Navigation (Wire-style underline) ──
        function PageTabs({ tabs, active, onChange }) {
            return (
                <div style={{
                    display: 'flex',
                    gap: '0',
                    borderBottom: '1px solid var(--border)',
                    marginBottom: '0'
                }}>
                    {tabs.map(tab => {
                        const isActive = active === tab.key;
                        return (
                            <button
                                key={tab.key}
                                onClick={() => onChange(tab.key)}
                                style={{
                                    padding: '14px 20px',
                                    background: 'none',
                                    border: 'none',
                                    borderBottom: isActive ? '2px solid var(--text-primary)' : '2px solid transparent',
                                    color: isActive ? 'var(--text-primary)' : 'var(--text-secondary)',
                                    fontSize: '14px',
                                    fontWeight: isActive ? 600 : 500,
                                    cursor: 'pointer',
                                    fontFamily: 'var(--font-main)',
                                    transition: 'all 0.15s ease',
                                    whiteSpace: 'nowrap'
                                }}
                            >
                                {tab.label}
                            </button>
                        );
                    })}
                </div>
            );
        }

        // ── Empty State ──
        function EmptyState({ icon, message }) {
            return (
                <div style={{
                    textAlign: 'center',
                    padding: '60px 20px',
                    color: 'var(--text-tertiary)'
                }}>
                    <div style={{ fontSize: '48px', marginBottom: '12px' }}>{icon}</div>
                    <p style={{ fontSize: '15px' }}>{message}</p>
                </div>
            );
        }

        // ── Search Bar ──
        function SearchBar({ value, onChange, placeholder, onExport, exportLabel }) {
            return (
                <div style={{
                    display: 'flex',
                    gap: '12px',
                    marginBottom: '16px',
                    alignItems: 'stretch'
                }}>
                    <div style={{ flex: 1, position: 'relative' }}>
                        <input
                            type="text"
                            value={value}
                            onChange={(e) => onChange(e.target.value)}
                            placeholder={placeholder || 'Search...'}
                            style={{
                                width: '100%',
                                padding: '12px 16px 12px 40px',
                                border: '1px solid var(--border)',
                                borderRadius: 'var(--radius-md)',
                                fontSize: '14px',
                                fontFamily: 'var(--font-main)',
                                background: 'var(--bg-card)',
                                color: 'var(--text-primary)',
                                outline: 'none',
                                transition: 'border-color 0.15s'
                            }}
                            onFocus={(e) => e.target.style.borderColor = 'var(--accent)'}
                            onBlur={(e) => e.target.style.borderColor = 'var(--border)'}
                        />
                        <svg style={{ position: 'absolute', left: '14px', top: '50%', transform: 'translateY(-50%)', width: '16px', height: '16px', color: 'var(--text-tertiary)' }} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                            <circle cx="11" cy="11" r="8" /><path d="m21 21-4.35-4.35" />
                        </svg>
                        {value && (
                            <button
                                onClick={() => onChange('')}
                                style={{
                                    position: 'absolute', right: '10px', top: '50%', transform: 'translateY(-50%)',
                                    background: 'var(--bg-muted)', border: 'none', borderRadius: '50%',
                                    width: '22px', height: '22px', cursor: 'pointer',
                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                    fontSize: '12px', color: 'var(--text-secondary)'
                                }}
                            >×</button>
                        )}
                    </div>
                    {onExport && (
                        <button
                            onClick={onExport}
                            style={{
                                padding: '0 20px',
                                border: '1px solid var(--border)',
                                borderRadius: 'var(--radius-md)',
                                background: 'var(--bg-card)',
                                fontSize: '13px',
                                fontWeight: 600,
                                cursor: 'pointer',
                                fontFamily: 'var(--font-main)',
                                color: 'var(--text-primary)',
                                whiteSpace: 'nowrap',
                                transition: 'all 0.15s'
                            }}
                            onMouseEnter={(e) => { e.target.style.background = 'var(--bg-muted)'; }}
                            onMouseLeave={(e) => { e.target.style.background = 'var(--bg-card)'; }}
                        >
                            {exportLabel || 'Export CSV'}
                        </button>
                    )}
                </div>
            );
        }

        // ── Button ──
        function Button({ children, onClick, variant = 'primary', size = 'md', style: extraStyle, disabled }) {
            const base = {
                fontFamily: 'var(--font-main)',
                fontWeight: 600,
                borderRadius: 'var(--radius-md)',
                cursor: disabled ? 'not-allowed' : 'pointer',
                border: 'none',
                transition: 'all 0.15s ease',
                opacity: disabled ? 0.6 : 1,
                display: 'inline-flex',
                alignItems: 'center',
                justifyContent: 'center',
                gap: '6px',
                whiteSpace: 'nowrap'
            };
            const sizes = {
                sm: { padding: '6px 14px', fontSize: '12px' },
                md: { padding: '10px 20px', fontSize: '14px' },
                lg: { padding: '14px 28px', fontSize: '15px' }
            };
            const variants = {
                primary: { background: 'var(--accent)', color: '#fff' },
                secondary: { background: 'var(--bg-muted)', color: 'var(--text-primary)', border: '1px solid var(--border)' },
                danger: { background: 'var(--red-bg)', color: 'var(--red-text)', border: `1px solid var(--red-border)` },
                ghost: { background: 'transparent', color: 'var(--text-secondary)' }
            };

            return (
                <button
                    onClick={onClick}
                    disabled={disabled}
                    style={{ ...base, ...sizes[size], ...variants[variant], ...extraStyle }}
                >
                    {children}
                </button>
            );
        }

        // ── Request Detail Fields (shared renderer — no more duplication!) ──
        function RequestDetails({ request, showLinks = true }) {
            const Field = ({ label, value, isLink }) => {
                if (!value) return null;
                return (
                    <div style={{ display: 'flex', gap: '6px', fontSize: '13px', lineHeight: '1.6' }}>
                        <span style={{ color: 'var(--text-secondary)', fontWeight: 500, flexShrink: 0 }}>{label}:</span>
                        {isLink && showLinks ? (
                            <a href={value} target="_blank" rel="noopener noreferrer"
                               style={{ color: 'var(--blue-text)', textDecoration: 'none', wordBreak: 'break-all' }}
                               onMouseEnter={(e) => e.target.style.textDecoration = 'underline'}
                               onMouseLeave={(e) => e.target.style.textDecoration = 'none'}
                            >{value}</a>
                        ) : (
                            <span style={{ color: 'var(--text-primary)', wordBreak: 'break-word', fontWeight: 600 }}>{value}</span>
                        )}
                    </div>
                );
            };

            if (request.type === 'get-item') {
                return (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '2px' }}>
                        <Field label="Item" value={request.item} />
                        <Field label="Link" value={request.link} isLink />
                        <Field label="Price" value={request.pricePoint} />
                        <Field label="Zendesk" value={request.zendeskId} />
                    </div>
                );
            }
            return (
                <div style={{ display: 'flex', flexDirection: 'column', gap: '2px' }}>
                    <Field label="Order" value={request.orderNumber} />
                    <Field label="Item" value={request.item} />
                    <Field label="Zendesk" value={request.zendeskId} />
                </div>
            );
        }

        // ── Wire-style Request Card ──
        function RequestCard({ request, children, onClick, selected }) {
            return (
                <div
                    onClick={onClick}
                    style={{
                        background: 'var(--bg-card)',
                        border: `1px solid ${selected ? 'var(--accent)' : 'var(--border)'}`,
                        borderRadius: 'var(--radius-lg)',
                        padding: '20px 24px',
                        marginBottom: '12px',
                        cursor: onClick ? 'pointer' : 'default',
                        transition: 'all 0.15s ease',
                        boxShadow: 'var(--shadow-card)'
                    }}
                    onMouseEnter={(e) => {
                        if (onClick) e.currentTarget.style.boxShadow = 'var(--shadow-card-hover)';
                    }}
                    onMouseLeave={(e) => {
                        e.currentTarget.style.boxShadow = 'var(--shadow-card)';
                    }}
                >
                    {/* Header row */}
                    <div style={{
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'flex-start',
                        marginBottom: '8px',
                        gap: '12px'
                    }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px', flex: 1, minWidth: 0 }}>
                            <StatusBadge status={request.status} />
                            <span style={{ fontSize: '13px', color: 'var(--text-secondary)' }}>
                                {getRequestLabel(request.type)}
                            </span>
                            {request.orderNumber && (
                                <span style={{ fontSize: '13px' }}>
                                    Order #: <strong>{request.orderNumber}</strong>
                                </span>
                            )}
                        </div>
                        {children}
                    </div>

                    {/* Submitter name */}
                    <div style={{
                        fontSize: '15px',
                        fontWeight: 600,
                        color: 'var(--text-primary)',
                        marginBottom: '4px',
                        textTransform: 'uppercase',
                        letterSpacing: '0.01em'
                    }}>
                        {request.submittedByName || 'Unknown'}
                    </div>

                    {/* Detail fields */}
                    <RequestDetails request={request} />

                    {/* Footer metadata */}
                    <div style={{
                        fontSize: '12px',
                        color: 'var(--text-tertiary)',
                        marginTop: '10px',
                        display: 'flex',
                        gap: '8px',
                        alignItems: 'center'
                    }}>
                        <span>✓ {request.submittedBy}</span>
                        <span>·</span>
                        <span>{formatDate(request.submittedAt)}</span>
                    </div>
                </div>
            );
        }

        // ── Form Field ──
        function FormField({ label, required, value, onChange, placeholder, type = 'text' }) {
            return (
                <div style={{ marginBottom: '16px' }}>
                    <label style={{
                        display: 'block',
                        fontSize: '13px',
                        fontWeight: 600,
                        color: 'var(--text-secondary)',
                        marginBottom: '6px'
                    }}>
                        {label} {required && <span style={{ color: 'var(--red-text)' }}>*</span>}
                    </label>
                    <input
                        type={type}
                        required={required}
                        value={value}
                        onChange={(e) => onChange(e.target.value)}
                        placeholder={placeholder}
                        style={{
                            width: '100%',
                            padding: '12px 16px',
                            border: '1px solid var(--border)',
                            borderRadius: 'var(--radius-md)',
                            fontSize: '14px',
                            fontFamily: 'var(--font-main)',
                            background: 'var(--bg-card)',
                            color: 'var(--text-primary)',
                            outline: 'none',
                            transition: 'border-color 0.15s'
                        }}
                        onFocus={(e) => e.target.style.borderColor = 'var(--accent)'}
                        onBlur={(e) => e.target.style.borderColor = 'var(--border)'}
                    />
                </div>
            );
        }

        /* ═══════════════════════════════════════════════════
           LOGIN VIEW
           ═══════════════════════════════════════════════════ */
        function LoginView({ onLogin }) {
            const [name, setName] = useState('');
            const [email, setEmail] = useState('');

            const handleLogin = (role) => {
                if (!email.trim() || !name.trim()) {
                    alert('Please enter both your name and email');
                    return;
                }
                const emailLower = email.toLowerCase();
                if (!CONFIG.allowedDomains.some(d => emailLower.endsWith(d))) {
                    alert('Please use your @jomashop.com or @zuckers.com email address');
                    return;
                }
                onLogin(role, name, email);
            };

            return (
                <div style={{
                    minHeight: '100vh',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    background: 'var(--bg-page)',
                    padding: '20px'
                }}>
                    <div className="fade-in" style={{
                        background: 'var(--bg-card)',
                        borderRadius: 'var(--radius-lg)',
                        border: '1px solid var(--border)',
                        boxShadow: 'var(--shadow-card)',
                        padding: '48px 40px',
                        width: '100%',
                        maxWidth: '420px'
                    }}>
                        <div style={{ textAlign: 'center', marginBottom: '36px' }}>
                            <img src={LOGO_URL} alt="Jomashop" style={{
                                width: '64px', height: '64px',
                                borderRadius: 'var(--radius-md)',
                                objectFit: 'cover',
                                margin: '0 auto 16px',
                                display: 'block'
                            }} />
                            <h1 style={{ fontSize: '22px', fontWeight: 700, marginBottom: '4px' }}>Request Manager</h1>
                            <p style={{ color: 'var(--text-secondary)', fontSize: '14px' }}>Sign in with your Jomashop email</p>
                        </div>

                        <FormField label="Your Name" required value={name} onChange={setName} placeholder="e.g., Sarah Chen" />
                        <FormField label="Email" required value={email} onChange={setEmail} placeholder="name@jomashop.com" type="email" />

                        <div style={{ display: 'flex', gap: '12px', marginTop: '24px' }}>
                            <Button onClick={() => handleLogin('team')} size="lg" style={{ flex: 1 }}>
                                Team Member
                            </Button>
                            <Button onClick={() => handleLogin('manager')} variant="secondary" size="lg" style={{ flex: 1 }}>
                                Manager
                            </Button>
                        </div>
                    </div>
                </div>
            );
        }

        /* ═══════════════════════════════════════════════════
           TEAM VIEW
           ═══════════════════════════════════════════════════ */
        function TeamView({ userName, userEmail, requests, onSubmit }) {
            const [tab, setTab] = useState('submit');
            const [type, setType] = useState('get-item');
            const [form, setForm] = useState({ item: '', link: '', pricePoint: '', orderNumber: '', zendeskId: '' });

            const myRequests = useMemo(() => requests.filter(r => r.submittedBy === userEmail), [requests, userEmail]);
            const pending = useMemo(() => myRequests.filter(r => r.status === 'pending'), [myRequests]);
            const completed = useMemo(() => myRequests.filter(r => r.status === 'completed'), [myRequests]);

            const handleSubmit = (e) => {
                e.preventDefault();
                onSubmit({ type, ...form });
                setForm({ item: '', link: '', pricePoint: '', orderNumber: '', zendeskId: '' });
            };

            const updateForm = (field, value) => setForm(prev => ({ ...prev, [field]: value }));

            const pageTabs = [
                { key: 'submit', label: 'Submit Request' },
                { key: 'pending', label: `Pending (${pending.length})` },
                { key: 'completed', label: `Completed (${completed.length})` },
            ];

            return (
                <div>
                    <PageTabs tabs={pageTabs} active={tab} onChange={setTab} />

                    <div style={{ padding: '28px 0' }}>
                        {tab === 'submit' && (
                            <div className="fade-in">
                                <h2 style={{ fontSize: '18px', fontWeight: 700, marginBottom: '20px' }}>New Request</h2>

                                {/* Type selector */}
                                <div style={{ display: 'flex', gap: '12px', marginBottom: '24px' }}>
                                    {[{ key: 'get-item', icon: '🛍️', label: 'Get Item', sub: 'Source a product' },
                                      { key: 'fill-order', icon: '📦', label: 'Fill Order', sub: 'Process an order' }].map(t => (
                                        <button
                                            key={t.key}
                                            type="button"
                                            onClick={() => setType(t.key)}
                                            style={{
                                                flex: 1,
                                                padding: '20px',
                                                borderRadius: 'var(--radius-md)',
                                                border: `2px solid ${type === t.key ? 'var(--accent)' : 'var(--border)'}`,
                                                background: type === t.key ? 'var(--accent-light)' : 'var(--bg-card)',
                                                cursor: 'pointer',
                                                textAlign: 'center',
                                                fontFamily: 'var(--font-main)',
                                                transition: 'all 0.15s'
                                            }}
                                        >
                                            <div style={{ fontSize: '28px', marginBottom: '6px' }}>{t.icon}</div>
                                            <div style={{ fontWeight: 700, fontSize: '14px' }}>{t.label}</div>
                                            <div style={{ fontSize: '12px', color: 'var(--text-secondary)', marginTop: '2px' }}>{t.sub}</div>
                                        </button>
                                    ))}
                                </div>

                                <form onSubmit={handleSubmit}>
                                    {type === 'get-item' ? (
                                        <>
                                            <FormField label="Item" required value={form.item} onChange={(v) => updateForm('item', v)} placeholder="e.g., Rolex Submariner Date" />
                                            <FormField label="Link" value={form.link} onChange={(v) => updateForm('link', v)} placeholder="https://..." />
                                            <FormField label="Price Point" value={form.pricePoint} onChange={(v) => updateForm('pricePoint', v)} placeholder="$10,000 - $15,000" />
                                            <FormField label="Zendesk ID / Customer" value={form.zendeskId} onChange={(v) => updateForm('zendeskId', v)} placeholder="e.g., #12345 or John Smith" />
                                        </>
                                    ) : (
                                        <>
                                            <FormField label="Order Number" required value={form.orderNumber} onChange={(v) => updateForm('orderNumber', v)} placeholder="ORD-2024-1234" />
                                            <FormField label="Item" required value={form.item} onChange={(v) => updateForm('item', v)} placeholder="e.g., Omega Seamaster" />
                                            <FormField label="Zendesk ID / Customer" value={form.zendeskId} onChange={(v) => updateForm('zendeskId', v)} placeholder="e.g., #12345 or John Smith" />
                                        </>
                                    )}
                                    <Button onClick={() => {}} size="lg" style={{ width: '100%', marginTop: '8px' }}>
                                        Submit Request
                                    </Button>
                                </form>
                            </div>
                        )}

                        {tab === 'pending' && (
                            <div className="fade-in">
                                <p style={{ fontSize: '13px', color: 'var(--text-tertiary)', marginBottom: '16px' }}>
                                    Your pending requests
                                </p>
                                {pending.length === 0 ? (
                                    <EmptyState icon="📭" message="No pending requests" />
                                ) : (
                                    pending.map(r => <RequestCard key={r.id} request={r} />)
                                )}
                            </div>
                        )}

                        {tab === 'completed' && (
                            <div className="fade-in">
                                <p style={{ fontSize: '13px', color: 'var(--text-tertiary)', marginBottom: '16px' }}>
                                    Completed requests
                                </p>
                                {completed.length === 0 ? (
                                    <EmptyState icon="✅" message="No completed requests yet" />
                                ) : (
                                    completed.map(r => (
                                        <div key={r.id}>
                                            <RequestCard request={r} />
                                            {r.response && r.response !== '(Closed without response)' && (
                                                <div style={{
                                                    marginTop: '-4px',
                                                    marginBottom: '12px',
                                                    marginLeft: '16px',
                                                    marginRight: '16px',
                                                    padding: '14px 18px',
                                                    background: 'var(--green-bg)',
                                                    border: '1px solid var(--green-border)',
                                                    borderRadius: '0 0 var(--radius-md) var(--radius-md)',
                                                    fontSize: '13px'
                                                }}>
                                                    <div style={{ fontWeight: 600, color: 'var(--green-text)', marginBottom: '4px' }}>Manager Response</div>
                                                    <div style={{ color: 'var(--text-primary)' }}>{r.response}</div>
                                                </div>
                                            )}
                                        </div>
                                    ))
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        /* ═══════════════════════════════════════════════════
           MANAGER VIEW
           ═══════════════════════════════════════════════════ */
        function ManagerView({ requests, sessions, onComplete, onCloseQuietly, onDelete, onBulkDelete, onForceLogout }) {
            const [tab, setTab] = useState('dashboard');
            const [responses, setResponses] = useState({});
            const [selectedIds, setSelectedIds] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [completedSearch, setCompletedSearch] = useState('');
            const [filterBy, setFilterBy] = useState('all');
            const [openCardId, setOpenCardId] = useState(null);
            const [sortBy, setSortBy] = useState('total');
            const [sortDir, setSortDir] = useState('desc');

            const pending = useMemo(() => requests.filter(r => r.status === 'pending'), [requests]);
            const completed = useMemo(() => requests.filter(r => r.status === 'completed'), [requests]);

            // Search filtering for pending
            const filteredPending = useMemo(() => {
                if (!searchQuery.trim()) return pending;
                const q = searchQuery.toLowerCase();
                return pending.filter(r => {
                    const userName = (r.submittedByName || '').toLowerCase();
                    const userEmail = (r.submittedBy || '').toLowerCase();
                    const item = (r.item || '').toLowerCase();
                    const orderNumber = (r.orderNumber || '').toLowerCase();
                    const zendeskId = (r.zendeskId || '').toLowerCase();

                    if (filterBy === 'user') return userName.includes(q) || userEmail.includes(q);
                    if (filterBy === 'item') return item.includes(q) || orderNumber.includes(q) || zendeskId.includes(q);
                    return userName.includes(q) || userEmail.includes(q) || item.includes(q) || orderNumber.includes(q) || zendeskId.includes(q);
                });
            }, [pending, searchQuery, filterBy]);

            // Search filtering for completed
            const filteredCompleted = useMemo(() => {
                if (!completedSearch.trim()) return completed;
                const q = completedSearch.toLowerCase();
                return completed.filter(r =>
                    (r.submittedByName || '').toLowerCase().includes(q) ||
                    (r.submittedBy || '').toLowerCase().includes(q) ||
                    (r.item || '').toLowerCase().includes(q) ||
                    (r.orderNumber || '').toLowerCase().includes(q) ||
                    (r.zendeskId || '').toLowerCase().includes(q) ||
                    (r.response || '').toLowerCase().includes(q)
                );
            }, [completed, completedSearch]);

            // User stats for dashboard
            const { sortedUsers, userStats } = useMemo(() => {
                const stats = {};
                requests.forEach(req => {
                    const email = req.submittedBy || 'Unknown';
                    if (!stats[email]) {
                        stats[email] = { name: req.submittedByName || 'Unknown', email, total: 0, pending: 0, completed: 0, lastLogin: null };
                    }
                    stats[email].total++;
                    if (req.status === 'pending') stats[email].pending++;
                    if (req.status === 'completed') stats[email].completed++;
                });
                Object.values(sessions).forEach(s => {
                    if (stats[s.email]) stats[s.email].lastLogin = s.lastLogin;
                });

                const sorted = Object.values(stats).sort((a, b) => {
                    let av, bv;
                    if (sortBy === 'name') { av = a.name.toLowerCase(); bv = b.name.toLowerCase(); }
                    else if (sortBy === 'lastLogin') { av = a.lastLogin ? new Date(a.lastLogin).getTime() : 0; bv = b.lastLogin ? new Date(b.lastLogin).getTime() : 0; }
                    else { av = a[sortBy]; bv = b[sortBy]; }
                    return sortDir === 'asc' ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
                });
                return { sortedUsers: sorted, userStats: stats };
            }, [requests, sessions, sortBy, sortDir]);

            // Daily activity
            const dailyData = useMemo(() => {
                const days = [];
                const today = new Date();
                for (let i = 29; i >= 0; i--) {
                    const d = new Date(today);
                    d.setDate(d.getDate() - i);
                    d.setHours(0, 0, 0, 0);
                    const next = new Date(d); next.setDate(next.getDate() + 1);
                    const count = requests.filter(r => {
                        const rd = new Date(r.submittedAt);
                        return rd >= d && rd < next;
                    }).length;
                    days.push({ label: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }), full: d.toLocaleDateString('en-US'), count });
                }
                return days;
            }, [requests]);

            const handleSort = (col) => {
                if (sortBy === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
                else { setSortBy(col); setSortDir('desc'); }
            };

            const toggleSelect = (id) => setSelectedIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
            const toggleSelectAll = () => setSelectedIds(prev => prev.length === completed.length ? [] : completed.map(r => r.id));

            const exportUserStats = () => {
                downloadCSV(
                    [['Name', 'Email', 'Total', 'Pending', 'Completed', 'Last Login'],
                     ...sortedUsers.map(u => [u.name, u.email, u.total, u.pending, u.completed, u.lastLogin ? formatDate(u.lastLogin) : 'Never'])],
                    `jomashop-stats-${new Date().toISOString().split('T')[0]}.csv`
                );
            };

            const exportDailyActivity = () => {
                downloadCSV(
                    [['Date', 'Requests'], ...dailyData.map(d => [d.full, d.count])],
                    `jomashop-daily-${new Date().toISOString().split('T')[0]}.csv`
                );
            };

            const viewUserRequests = (email) => {
                setSearchQuery(email);
                setTab('pending');
            };

            const pageTabs = [
                { key: 'dashboard', label: 'Dashboard' },
                { key: 'pending', label: `Pending (${pending.length})` },
                { key: 'completed', label: `Completed (${completed.length})` },
            ];

            const maxDailyCount = Math.max(...dailyData.map(d => d.count), 1);
            const totalLast30 = dailyData.reduce((s, d) => s + d.count, 0);

            return (
                <div>
                    <PageTabs tabs={pageTabs} active={tab} onChange={(t) => { setTab(t); if (t === 'dashboard') setSearchQuery(''); }} />

                    <div style={{ padding: '28px 0' }}>

                        {/* ── DASHBOARD ── */}
                        {tab === 'dashboard' && (
                            <div className="fade-in">
                                {/* Stat cards */}
                                <div style={{ display: 'flex', gap: '12px', marginBottom: '28px', flexWrap: 'wrap' }}>
                                    <StatCard label="Total requests" value={requests.length} />
                                    <StatCard label="Pending" value={pending.length} />
                                    <StatCard label="Completed" value={completed.length} />
                                </div>

                                {/* User table */}
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
                                    <h3 style={{ fontSize: '16px', fontWeight: 700 }}>Requests by User</h3>
                                    <Button onClick={exportUserStats} variant="secondary" size="sm">Export CSV</Button>
                                </div>

                                {sortedUsers.length === 0 ? (
                                    <EmptyState icon="📊" message="No requests yet" />
                                ) : (
                                    <div style={{ overflowX: 'auto', marginBottom: '32px' }}>
                                        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '13px' }}>
                                            <thead>
                                                <tr>
                                                    {[
                                                        { key: 'name', label: 'Name' },
                                                        { key: 'total', label: 'Total' },
                                                        { key: 'pending', label: 'Pending' },
                                                        { key: 'completed', label: 'Completed' },
                                                        { key: 'lastLogin', label: 'Last Login' },
                                                        { key: null, label: 'Session' }
                                                    ].map(col => (
                                                        <th
                                                            key={col.label}
                                                            onClick={col.key ? () => handleSort(col.key) : undefined}
                                                            style={{
                                                                textAlign: col.key === 'name' ? 'left' : 'center',
                                                                padding: '10px 12px',
                                                                borderBottom: '1px solid var(--border)',
                                                                fontWeight: 600,
                                                                color: 'var(--text-secondary)',
                                                                cursor: col.key ? 'pointer' : 'default',
                                                                userSelect: 'none',
                                                                whiteSpace: 'nowrap',
                                                                background: 'var(--bg-muted)'
                                                            }}
                                                        >
                                                            {col.label}
                                                            {col.key && (
                                                                <span style={{ marginLeft: '4px', opacity: sortBy === col.key ? 1 : 0.3 }}>
                                                                    {sortBy === col.key ? (sortDir === 'asc' ? '↑' : '↓') : '⇅'}
                                                                </span>
                                                            )}
                                                        </th>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {sortedUsers.map(user => (
                                                    <tr key={user.email} style={{ borderBottom: '1px solid var(--border)' }}
                                                        onMouseEnter={(e) => e.currentTarget.style.background = 'var(--bg-hover)'}
                                                        onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
                                                    >
                                                        <td style={{ padding: '10px 12px' }}>
                                                            <button onClick={() => viewUserRequests(user.email)}
                                                                style={{ background: 'none', border: 'none', color: 'var(--blue-text)', fontWeight: 600, cursor: 'pointer', fontFamily: 'var(--font-main)', fontSize: '13px', textDecoration: 'none' }}
                                                                onMouseEnter={(e) => e.target.style.textDecoration = 'underline'}
                                                                onMouseLeave={(e) => e.target.style.textDecoration = 'none'}
                                                            >{user.name}</button>
                                                            <div style={{ fontSize: '11px', color: 'var(--text-tertiary)' }}>{user.email}</div>
                                                        </td>
                                                        <td style={{ textAlign: 'center', padding: '10px 12px', fontWeight: 700 }}>{user.total}</td>
                                                        <td style={{ textAlign: 'center', padding: '10px 12px', color: user.pending > 0 ? 'var(--yellow-text)' : 'var(--text-tertiary)', fontWeight: user.pending > 0 ? 700 : 400 }}>
                                                            {user.pending > 0 ? (
                                                                <button onClick={() => viewUserRequests(user.email)}
                                                                    style={{ background: 'none', border: 'none', color: 'var(--yellow-text)', fontWeight: 700, cursor: 'pointer', fontFamily: 'var(--font-main)', fontSize: '13px', textDecoration: 'underline' }}
                                                                >{user.pending}</button>
                                                            ) : '0'}
                                                        </td>
                                                        <td style={{ textAlign: 'center', padding: '10px 12px', color: 'var(--green-text)' }}>{user.completed}</td>
                                                        <td style={{ textAlign: 'center', padding: '10px 12px', fontSize: '12px', color: 'var(--text-tertiary)' }}>
                                                            {user.lastLogin ? (
                                                                <span style={{ display: 'inline-flex', alignItems: 'center', gap: '5px' }}>
                                                                    <span style={{ width: '7px', height: '7px', borderRadius: '50%', background: 'var(--green-border)', display: 'inline-block' }} />
                                                                    {getTimeSince(user.lastLogin)}
                                                                </span>
                                                            ) : 'Never'}
                                                        </td>
                                                        <td style={{ textAlign: 'center', padding: '10px 12px' }}>
                                                            {user.lastLogin ? (
                                                                <Button onClick={() => onForceLogout(user.email, user.name)} variant="danger" size="sm">
                                                                    Logout
                                                                </Button>
                                                            ) : (
                                                                <span style={{ fontSize: '11px', color: 'var(--text-tertiary)' }}>Offline</span>
                                                            )}
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {/* Daily activity chart */}
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
                                    <h3 style={{ fontSize: '16px', fontWeight: 700 }}>Daily Activity (Last 30 Days)</h3>
                                    <Button onClick={exportDailyActivity} variant="secondary" size="sm">Export Chart Data</Button>
                                </div>

                                <div style={{
                                    background: 'var(--bg-card)',
                                    border: '1px solid var(--border)',
                                    borderRadius: 'var(--radius-lg)',
                                    padding: '24px',
                                    boxShadow: 'var(--shadow-card)'
                                }}>
                                    <div style={{ display: 'flex', alignItems: 'flex-end', gap: '3px', height: '200px', padding: '0 0 0 30px', position: 'relative' }}>
                                        {/* Y-axis */}
                                        <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, display: 'flex', flexDirection: 'column', justifyContent: 'space-between', fontSize: '11px', color: 'var(--text-tertiary)' }}>
                                            <span>{maxDailyCount}</span>
                                            <span>{Math.floor(maxDailyCount / 2)}</span>
                                            <span>0</span>
                                        </div>
                                        {dailyData.map((day, i) => (
                                            <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', alignItems: 'center', height: '100%', position: 'relative' }}
                                                title={`${day.label}: ${day.count} request${day.count !== 1 ? 's' : ''}`}
                                            >
                                                <div style={{
                                                    width: '100%',
                                                    maxWidth: '16px',
                                                    height: `${(day.count / maxDailyCount) * 100}%`,
                                                    minHeight: day.count > 0 ? '4px' : '0',
                                                    background: 'var(--accent)',
                                                    borderRadius: '3px 3px 0 0',
                                                    transition: 'height 0.3s ease',
                                                    opacity: 0.85
                                                }} />
                                            </div>
                                        ))}
                                    </div>
                                    {/* X-axis labels */}
                                    <div style={{ display: 'flex', gap: '3px', marginTop: '8px', paddingLeft: '30px' }}>
                                        {dailyData.map((day, i) => (
                                            <div key={i} style={{ flex: 1, textAlign: 'center' }}>
                                                {(i === 0 || i === 14 || i === 29) && (
                                                    <span style={{ fontSize: '10px', color: 'var(--text-tertiary)' }}>{day.label}</span>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                    {/* Summary */}
                                    <div style={{ display: 'flex', gap: '24px', justifyContent: 'center', marginTop: '20px', paddingTop: '16px', borderTop: '1px solid var(--border)' }}>
                                        <div style={{ textAlign: 'center' }}>
                                            <div style={{ fontSize: '12px', color: 'var(--text-tertiary)', marginBottom: '2px' }}>Total (30d)</div>
                                            <div style={{ fontSize: '20px', fontWeight: 700 }}>{totalLast30}</div>
                                        </div>
                                        <div style={{ textAlign: 'center' }}>
                                            <div style={{ fontSize: '12px', color: 'var(--text-tertiary)', marginBottom: '2px' }}>Avg/Day</div>
                                            <div style={{ fontSize: '20px', fontWeight: 700 }}>{(totalLast30 / 30).toFixed(1)}</div>
                                        </div>
                                        <div style={{ textAlign: 'center' }}>
                                            <div style={{ fontSize: '12px', color: 'var(--text-tertiary)', marginBottom: '2px' }}>Today</div>
                                            <div style={{ fontSize: '20px', fontWeight: 700 }}>{dailyData[dailyData.length - 1]?.count || 0}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ── PENDING ── */}
                        {tab === 'pending' && (
                            <div className="fade-in">
                                <SearchBar
                                    value={searchQuery}
                                    onChange={setSearchQuery}
                                    placeholder="Search by sender, item, order #, Zendesk..."
                                />

                                {/* Filter pills */}
                                <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '16px', flexWrap: 'wrap' }}>
                                    <span style={{ fontSize: '13px', color: 'var(--text-secondary)' }}>Filter:</span>
                                    {[{ key: 'all', label: 'All', icon: '' },
                                      { key: 'user', label: 'User', icon: '👤 ' },
                                      { key: 'item', label: 'Item', icon: '📦 ' }].map(f => (
                                        <button
                                            key={f.key}
                                            onClick={() => setFilterBy(f.key)}
                                            style={{
                                                padding: '5px 14px',
                                                borderRadius: 'var(--radius-pill)',
                                                border: `1px solid ${filterBy === f.key ? 'var(--accent)' : 'var(--border)'}`,
                                                background: filterBy === f.key ? 'var(--accent)' : 'var(--bg-card)',
                                                color: filterBy === f.key ? '#fff' : 'var(--text-primary)',
                                                fontSize: '13px',
                                                fontWeight: 500,
                                                cursor: 'pointer',
                                                fontFamily: 'var(--font-main)',
                                                transition: 'all 0.15s'
                                            }}
                                        >
                                            {f.icon}{f.label}
                                        </button>
                                    ))}
                                </div>

                                {searchQuery && (
                                    <p style={{ fontSize: '12px', color: 'var(--text-tertiary)', marginBottom: '12px' }}>
                                        Showing {filteredPending.length} of {pending.length} requests
                                    </p>
                                )}

                                {pending.length === 0 ? (
                                    <EmptyState icon="📦" message="No pending requests" />
                                ) : filteredPending.length === 0 ? (
                                    <EmptyState icon="🔍" message="No matches" />
                                ) : (
                                    filteredPending.map(r => (
                                        <div key={r.id}>
                                            {/* Collapsed compact card */}
                                            <div
                                                onClick={() => setOpenCardId(openCardId === r.id ? null : r.id)}
                                                style={{
                                                    background: 'var(--bg-card)',
                                                    border: `1px solid ${openCardId === r.id ? 'var(--accent)' : 'var(--border)'}`,
                                                    borderRadius: openCardId === r.id ? 'var(--radius-lg) var(--radius-lg) 0 0' : 'var(--radius-lg)',
                                                    padding: '16px 20px',
                                                    marginBottom: openCardId === r.id ? '0' : '10px',
                                                    cursor: 'pointer',
                                                    display: 'flex',
                                                    alignItems: 'center',
                                                    justifyContent: 'space-between',
                                                    gap: '16px',
                                                    transition: 'all 0.15s ease',
                                                    boxShadow: 'var(--shadow-card)'
                                                }}
                                                onMouseEnter={(e) => { if (openCardId !== r.id) e.currentTarget.style.boxShadow = 'var(--shadow-card-hover)'; }}
                                                onMouseLeave={(e) => { e.currentTarget.style.boxShadow = 'var(--shadow-card)'; }}
                                            >
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '12px', flex: 1, minWidth: 0 }}>
                                                    <span style={{ fontSize: '22px', flexShrink: 0 }}>{getRequestIcon(r.type)}</span>
                                                    <div style={{ minWidth: 0, flex: 1 }}>
                                                        <div style={{ fontSize: '14px', display: 'flex', alignItems: 'center', gap: '6px', flexWrap: 'wrap' }}>
                                                            <span style={{ fontWeight: 600, color: 'var(--text-primary)' }}>{getRequestLabel(r.type)}</span>
                                                            <span style={{ color: 'var(--text-tertiary)' }}>•</span>
                                                            <span style={{ fontWeight: 600, color: 'var(--blue-text)' }}>{r.submittedByName || 'Unknown'}</span>
                                                        </div>
                                                        <div style={{ fontSize: '13px', color: 'var(--text-secondary)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                                                            {r.type === 'get-item' ? r.item : `${r.orderNumber} — ${r.item}`}
                                                        </div>
                                                    </div>
                                                </div>
                                                <div style={{
                                                    width: '32px', height: '32px',
                                                    borderRadius: '50%',
                                                    background: openCardId === r.id ? 'var(--accent)' : 'var(--bg-muted)',
                                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                                    flexShrink: 0,
                                                    transition: 'all 0.2s',
                                                    transform: openCardId === r.id ? 'rotate(45deg)' : 'rotate(0deg)'
                                                }}>
                                                    <span style={{ color: openCardId === r.id ? '#fff' : 'var(--accent)', fontWeight: 700, fontSize: '20px', lineHeight: 1 }}>+</span>
                                                </div>
                                            </div>

                                            {/* Expanded detail + response area */}
                                            {openCardId === r.id && (
                                                <div className="fade-in" style={{
                                                    marginBottom: '12px',
                                                    padding: '20px',
                                                    background: 'var(--bg-muted)',
                                                    border: '1px solid var(--accent)',
                                                    borderTop: 'none',
                                                    borderRadius: '0 0 var(--radius-lg) var(--radius-lg)'
                                                }}>
                                                    {/* Request details */}
                                                    <div style={{
                                                        background: 'var(--bg-card)',
                                                        border: '1px solid var(--border)',
                                                        borderRadius: 'var(--radius-md)',
                                                        padding: '16px',
                                                        marginBottom: '16px'
                                                    }}>
                                                        <div style={{ fontSize: '12px', fontWeight: 600, color: 'var(--text-tertiary)', marginBottom: '10px', textTransform: 'uppercase', letterSpacing: '0.04em' }}>Request Details</div>
                                                        <RequestDetails request={r} />
                                                        <div style={{ fontSize: '12px', color: 'var(--text-tertiary)', marginTop: '10px' }}>
                                                            Submitted: {formatDate(r.submittedAt)} · {r.submittedBy}
                                                        </div>
                                                    </div>

                                                    {/* Response textarea */}
                                                    <label style={{ display: 'block', fontSize: '13px', fontWeight: 600, color: 'var(--text-secondary)', marginBottom: '8px' }}>
                                                        Your Response (Optional)
                                                    </label>
                                                    <textarea
                                                        value={responses[r.id] || ''}
                                                        onChange={(e) => setResponses(prev => ({ ...prev, [r.id]: e.target.value }))}
                                                        onClick={(e) => e.stopPropagation()}
                                                        placeholder="Type your response here..."
                                                        style={{
                                                            width: '100%',
                                                            height: '100px',
                                                            padding: '12px 16px',
                                                            border: '1px solid var(--border)',
                                                            borderRadius: 'var(--radius-md)',
                                                            fontSize: '14px',
                                                            fontFamily: 'var(--font-main)',
                                                            background: 'var(--bg-card)',
                                                            resize: 'vertical',
                                                            outline: 'none'
                                                        }}
                                                        onFocus={(e) => e.target.style.borderColor = 'var(--accent)'}
                                                        onBlur={(e) => e.target.style.borderColor = 'var(--border)'}
                                                    />
                                                    <div style={{ display: 'flex', gap: '10px', marginTop: '12px' }}>
                                                        <Button
                                                            onClick={(e) => {
                                                                e.stopPropagation();
                                                                onComplete(r.id, responses[r.id]);
                                                                setResponses(prev => ({ ...prev, [r.id]: '' }));
                                                                setOpenCardId(null);
                                                            }}
                                                            size="md"
                                                            style={{ flex: 1 }}
                                                        >
                                                            ✅ Complete & Notify
                                                        </Button>
                                                        <Button
                                                            onClick={(e) => { e.stopPropagation(); onCloseQuietly(r.id); setOpenCardId(null); }}
                                                            variant="secondary"
                                                            size="md"
                                                        >
                                                            Close Quietly
                                                        </Button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {/* ── COMPLETED ── */}
                        {tab === 'completed' && (
                            <div className="fade-in">
                                <SearchBar
                                    value={completedSearch}
                                    onChange={setCompletedSearch}
                                    placeholder="Search by sender, item, order #, response..."
                                />

                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px', flexWrap: 'wrap', gap: '8px' }}>
                                    <p style={{ fontSize: '13px', color: 'var(--text-tertiary)' }}>
                                        {completedSearch ? `Showing ${filteredCompleted.length} of ` : ''}{completed.length} completed request{completed.length !== 1 ? 's' : ''}
                                    </p>
                                    {completed.length > 0 && (
                                        <div style={{ display: 'flex', gap: '8px' }}>
                                            <Button onClick={toggleSelectAll} variant="secondary" size="sm">
                                                {selectedIds.length === completed.length ? 'Deselect All' : 'Select All'}
                                            </Button>
