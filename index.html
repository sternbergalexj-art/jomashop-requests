                                            {selectedIds.length > 0 && (
                                                <Button onClick={() => { onBulkDelete(selectedIds); setSelectedIds([]); }} variant="danger" size="sm">
                                                    Delete ({selectedIds.length})
                                                </Button>
                                            )}
                                        </div>
                                    )}
                                </div>

                                {completed.length === 0 ? (
                                    <EmptyState icon="✅" message="No completed requests" />
                                ) : filteredCompleted.length === 0 ? (
                                    <EmptyState icon="🔍" message="No matches" />
                                ) : (
                                    filteredCompleted.map(r => (
                                        <div key={r.id} style={{ position: 'relative' }}>
                                            <div style={{ position: 'absolute', top: '20px', left: '-32px', zIndex: 1 }}>
                                                <input
                                                    type="checkbox"
                                                    checked={selectedIds.includes(r.id)}
                                                    onChange={() => toggleSelect(r.id)}
                                                    style={{ width: '16px', height: '16px', cursor: 'pointer', accentColor: 'var(--accent)' }}
                                                />
                                            </div>
                                            <RequestCard request={r} selected={selectedIds.includes(r.id)}>
                                                <button
                                                    onClick={(e) => { e.stopPropagation(); onDelete(r.id); }}
                                                    style={{
                                                        background: 'none', border: 'none',
                                                        color: 'var(--text-tertiary)',
                                                        cursor: 'pointer', fontSize: '20px',
                                                        lineHeight: 1, padding: '4px',
                                                        transition: 'color 0.15s'
                                                    }}
                                                    onMouseEnter={(e) => e.target.style.color = 'var(--red-text)'}
                                                    onMouseLeave={(e) => e.target.style.color = 'var(--text-tertiary)'}
                                                    title="Delete"
                                                >×</button>
                                            </RequestCard>
                                            {r.response && r.response !== '(Closed without response)' && (
                                                <div style={{
                                                    marginTop: '-4px', marginBottom: '12px',
                                                    padding: '14px 18px',
                                                    background: 'var(--green-bg)',
                                                    border: '1px solid var(--green-border)',
                                                    borderRadius: '0 0 var(--radius-md) var(--radius-md)',
                                                    fontSize: '13px'
                                                }}>
                                                    <div style={{ fontWeight: 600, color: 'var(--green-text)', marginBottom: '4px' }}>Response</div>
                                                    <div style={{ color: 'var(--text-primary)' }}>{r.response}</div>
                                                </div>
                                            )}
                                        </div>
                                    ))
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        /* ═══════════════════════════════════════════════════
           APP ROOT
           ═══════════════════════════════════════════════════ */
        function App() {
            const [view, setView] = useState('login');
            const [userRole, setUserRole] = useState(null);
            const [userName, setUserName] = useState('');
            const [userEmail, setUserEmail] = useState('');
            const [requests, setRequests] = useState([]);
            const [sessions, setSessions] = useState({});
            const [loading, setLoading] = useState(false);

            // Restore session from localStorage
            useEffect(() => {
                const savedEmail = localStorage.getItem('jomashopEmail');
                const savedName = localStorage.getItem('jomashopName');
                const savedRole = localStorage.getItem('jomashopRole');
                if (savedEmail && savedName && savedRole) {
                    setUserEmail(savedEmail);
                    setUserName(savedName);
                    setUserRole(savedRole);
                    setView(savedRole === 'team' ? 'team' : 'manager');
                    trackUserSession(savedEmail, savedName);
                }
            }, []);

            // Subscribe to requests
            useEffect(() => {
                setLoading(true);
                const ref = database.ref('requests');
                ref.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const arr = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                        setRequests(arr.sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt)));
                    } else {
                        setRequests([]);
                    }
                    setLoading(false);
                });
                return () => ref.off();
            }, []);

            // Subscribe to sessions (manager only)
            useEffect(() => {
                if (userRole === 'manager') {
                    const ref = database.ref('sessions');
                    ref.on('value', (snapshot) => setSessions(snapshot.val() || {}));
                    return () => ref.off();
                }
            }, [userRole]);

            // Update favicon on request changes
            useEffect(() => {
                if (userRole === 'manager') {
                    const count = requests.filter(r => r.status === 'pending').length;
                    updateFavicon(count);
                    document.title = count > 0 ? `(${count}) Jomashop Requests` : 'Jomashop Request Manager';
                } else {
                    updateFavicon(0);
                }
            }, [requests, userRole]);

            // ── Handlers ──
            const handleLogin = (role, name, email) => {
                setUserRole(role);
                setUserName(name);
                setUserEmail(email);
                localStorage.setItem('jomashopEmail', email);
                localStorage.setItem('jomashopName', name);
                localStorage.setItem('jomashopRole', role);
                setView(role === 'team' ? 'team' : 'manager');
                trackUserSession(email, name);
            };

            const handleLogout = () => {
                removeUserSession(userEmail);
                localStorage.removeItem('jomashopEmail');
                localStorage.removeItem('jomashopName');
                localStorage.removeItem('jomashopRole');
                setView('login');
                setUserRole(null);
                setUserName('');
                setUserEmail('');
                updateFavicon(0);
                document.title = 'Jomashop Request Manager';
            };

            const submitRequest = async (req) => {
                const newRequest = {
                    ...req,
                    submittedBy: userEmail,
                    submittedByName: userName,
                    submittedAt: new Date().toISOString(),
                    status: 'pending',
                    response: ''
                };
                await database.ref('requests').push(newRequest);
                try {
                    await sendManagerNotification(newRequest);
                    alert('✅ Request submitted! Manager has been notified.');
                } catch {
                    alert('✅ Request submitted! (Email notification failed, but request was saved)');
                }
            };

            const completeRequest = async (id, response) => {
                if (!response?.trim()) { alert('Please type a response'); return; }
                const request = requests.find(r => r.id === id);
                await database.ref(`requests/${id}`).update({
                    status: 'completed',
                    response,
                    completedAt: new Date().toISOString()
                });
                try {
                    await Promise.all([
                        sendCompletionEmail(request, response),
                        sendTeamsNotification(request, response)
                    ]);
                    alert('✅ Response sent! Notifications delivered to ' + request.submittedByName);
                } catch {
                    alert('✅ Response saved! (Some notifications may have failed)');
                }
            };

            const closeRequestQuietly = async (id) => {
                if (confirm('Close this request without notifying the team member?')) {
                    await database.ref(`requests/${id}`).update({
                        status: 'completed',
                        response: '(Closed without response)',
                        completedAt: new Date().toISOString()
                    });
                }
            };

            const deleteRequest = async (id) => {
                if (confirm('Delete this request?')) {
                    await database.ref(`requests/${id}`).remove();
                }
            };

            const bulkDeleteRequests = async (ids) => {
                if (confirm(`Delete ${ids.length} request(s)?`)) {
                    await Promise.all(ids.map(id => database.ref(`requests/${id}`).remove()));
                }
            };

            const forceLogoutUser = async (email, name) => {
                if (confirm(`Force logout for ${name}?`)) {
                    await removeUserSession(email);
                    alert(`✅ ${name} has been logged out`);
                }
            };

            // ── Render ──
            if (view === 'login') return <LoginView onLogin={handleLogin} />;

            if (loading) {
                return (
                    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg-page)' }}>
                        <div style={{ textAlign: 'center', color: 'var(--text-secondary)' }}>
                            <div style={{ fontSize: '40px', marginBottom: '12px' }}>⏳</div>
                            <p style={{ fontSize: '15px' }}>Loading requests...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div style={{ minHeight: '100vh', background: 'var(--bg-page)' }}>
                    {/* Top header bar */}
                    <header style={{
                        background: 'var(--bg-card)',
                        borderBottom: '1px solid var(--border)',
                        position: 'sticky',
                        top: 0,
                        zIndex: 10
                    }}>
                        <div style={{
                            maxWidth: '960px',
                            margin: '0 auto',
                            padding: '16px 28px',
                            display: 'flex',
                            justifyContent: 'space-between',
                            alignItems: 'center'
                        }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '14px' }}>
                                <img src={LOGO_URL} alt="Jomashop" style={{
                                    width: '40px', height: '40px',
                                    borderRadius: 'var(--radius-sm)',
                                    objectFit: 'cover'
                                }} />
                                <div>
                                    <div style={{ fontSize: '16px', fontWeight: 700 }}>Request Manager</div>
                                    <div style={{ fontSize: '12px', color: 'var(--text-secondary)' }}>
                                        {userName}
                                        <span style={{
                                            display: 'inline-block',
                                            marginLeft: '8px',
                                            padding: '1px 10px',
                                            borderRadius: 'var(--radius-pill)',
                                            background: userRole === 'manager' ? 'var(--accent-light)' : 'var(--blue-bg)',
                                            color: userRole === 'manager' ? 'var(--accent)' : 'var(--blue-text)',
                                            fontSize: '11px',
                                            fontWeight: 600
                                        }}>
                                            {userRole === 'manager' ? 'Admin' : 'Team'}
                                        </span>
                                    </div>
                                </div>
                            </div>
                            <Button onClick={handleLogout} variant="secondary" size="sm">Sign out</Button>
                        </div>
                    </header>

                    {/* Main content */}
                    <main style={{
                        maxWidth: '960px',
                        margin: '0 auto',
                        padding: '0 28px 40px'
                    }}>
                        {userRole === 'team' && (
                            <TeamView
                                userName={userName}
                                userEmail={userEmail}
                                requests={requests}
                                onSubmit={submitRequest}
                            />
                        )}
                        {userRole === 'manager' && (
                            <ManagerView
                                requests={requests}
                                sessions={sessions}
                                onComplete={completeRequest}
                                onCloseQuietly={closeRequestQuietly}
                                onDelete={deleteRequest}
                                onBulkDelete={bulkDeleteRequests}
                                onForceLogout={forceLogoutUser}
                            />
                        )}
                    </main>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
